version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  model-server:
    build:
      context: ../..
      dockerfile: backend/docker/Dockerfile.model
    ports:
      - "8001:8001"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 4G